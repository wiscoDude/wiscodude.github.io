<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signatures by county</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{--ink:#16252b;--ink-soft:#4a5e66;--line:#dde4e3;--paper:#f5f3ec;--panel:#fff;}
  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--ink);background:var(--paper);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  header{padding:18px 26px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    flex:0 0 auto;display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  h1{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
  h1 small{display:block;font-size:12.5px;font-weight:400;color:var(--ink-soft);margin-top:3px;}
  .seg{display:flex;gap:4px;background:#eceae1;padding:4px;border-radius:10px;margin-left:auto;}
  .seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:600;
    color:var(--ink-soft);padding:7px 14px;border-radius:7px;cursor:pointer;transition:all .12s;
    display:flex;align-items:center;gap:7px;}
  .seg button .dot{width:9px;height:9px;border-radius:50%;}
  .seg button.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  main{flex:1 1 auto;display:flex;min-height:0;}
  #map{flex:1 1 auto;background:#e9ece8;}
  aside{flex:0 0 280px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:18px 20px;}
  aside h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:12px;}
  .row{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:7px;cursor:pointer;}
  .row:hover{background:#f0efe7;}
  .rank{font-size:11px;color:var(--ink-soft);width:16px;text-align:right;flex:0 0 auto;font-variant-numeric:tabular-nums;}
  .bw{flex:1 1 auto;min-width:0;}.nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar{height:4px;border-radius:2px;margin-top:4px;}
  .cnt{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;flex:0 0 auto;width:42px;text-align:right;}
  .legend{background:rgba(255,255,255,.94);padding:11px 14px;border-radius:10px;border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(0,0,0,.06);font-size:11px;color:var(--ink-soft);}
  .legend .lt{font-weight:600;color:var(--ink);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;font-size:10px;}
  .lk{display:flex;align-items:center;gap:7px;margin:3px 0;}.lk .dot{width:10px;height:10px;border-radius:50%;}
  .leaflet-popup-content-wrapper{border-radius:9px;}.leaflet-popup-content{margin:11px 14px;font-family:inherit;}
  .pc-name{font-size:14px;font-weight:700;}.pc-sub{font-size:11px;color:var(--ink-soft);margin:2px 0 7px;}
  .pc-r{display:flex;align-items:center;gap:7px;font-size:12px;margin:2px 0;}.pc-r .dot{width:7px;height:7px;border-radius:50%;}
  .pc-r b{margin-left:auto;font-variant-numeric:tabular-nums;}
  .foot{font-size:11px;color:var(--ink-soft);margin-top:16px;padding-top:14px;border-top:1px solid var(--line);line-height:1.5;}
  @media(max-width:820px){aside{display:none}header{padding:14px 18px}.seg{order:3;width:100%;margin-left:0;justify-content:center}}
</style></head><body>
<header>

  <h1>Signatures by county <small id="sub">All three campaigns combined</small></h1></div>
  <div class="seg" id="seg">
    <button data-m="total" class="on">All combined</button>
    <button data-m="Rodriguez"><span class="dot" style="background:#0e7c7b"></span>Rodriguez</button>
    <button data-m="Hong"><span class="dot" style="background:#6d5bd0"></span>Hong</button>
    <button data-m="Barnes"><span class="dot" style="background:#c4892f"></span>Barnes</button>
  </div>
</header>
<main><div id="map"></div>
<aside><h2 id="lt">Top counties</h2><div id="list"></div><div class="foot" id="foot"></div></aside></main>

y": "Iron", "lat": 46.261, "lon": -90.2424, "counts": {"Rodriguez": 0, "Hong": 1, "Barnes": 0}, "total": 1}, {"cty": "Rusk", "lat": 45.4749, "lon": -91.1333, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 0}, "total": 0}, {"cty": "Menominee", "lat": 45.0042, "lon": -88.7095, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 0}, "total": 0}, {"cty": "Forest", "lat": 45.6667, "lon": -88.7709, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 0}, "total": 0}, {"cty": "Pepin", "lat": 44.5833, "lon": -91.999, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 0}, "total": 0}], TOT={"Rodriguez": 3355, "Hong": 4496, "Barnes": 2438};
const C={Rodriguez:'#0e7c7b',Hong:'#6d5bd0',Barnes:'#c4892f',total:'#1d6f5e'};
const NAMES=['Rodriguez','Hong','Barnes'];
let mode='total';
const map=L.map('map',{zoomControl:false,scrollWheelZoom:true}).setView([44.5,-89.8],7);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
const R=v=>Math.max(4,Math.sqrt(v)*1.15);
const valOf=p=> mode==='total'?p.total:p.counts[mode];
const layer=L.layerGroup().addTo(map);
function popup(p){
  const rows=NAMES.map(n=>`<div class="pc-r"><span class="dot" style="background:${C[n]}"></span>${n}<b>${p.counts[n].toLocaleString()}</b></div>`).join('');
  return `<div class="pc-name">${p.cty} County</div>
    <div class="pc-sub">${valOf(p).toLocaleString()} ${mode==='total'?'total signatures':'signatures'}</div>${rows}`;
}
function draw(){
  layer.clearLayers();
  const col=C[mode];
  PTS.forEach(p=>{const v=valOf(p); if(v<=0)return;
    const m=L.circleMarker([p.lat,p.lon],{radius:R(v),color:col,weight:1,opacity:.55,fillColor:col,fillOpacity:.42}).addTo(layer);
    m.bindPopup(popup(p));
    m.on('mouseover',()=>m.setStyle({fillOpacity:.7,weight:2}));
    m.on('mouseout',()=>m.setStyle({fillOpacity:.42,weight:1}));
    p._m=m;});
}
function list(){
  const arr=[...PTS].map(p=>({p,v:valOf(p)})).filter(o=>o.v>0).sort((a,b)=>b.v-a.v).slice(0,15);
  const mx=arr.length?arr[0].v:1, col=C[mode];
  document.getElementById('lt').textContent= mode==='total'?'Top counties (combined)':mode+' \u2014 top counties';
  document.getElementById('list').innerHTML=arr.map((o,i)=>`
    <div class="row" data-c="${o.p.cty}"><div class="rank">${i+1}</div>
    <div class="bw"><div class="nm">${o.p.cty}</div>
    <div class="bar" style="width:${Math.max(6,o.v/mx*100)}%;background:${col}"></div></div>
    <div class="cnt">${o.v.toLocaleString()}</div></div>`).join('');
  document.querySelectorAll('#list .row').forEach(r=>r.onclick=()=>{
    const p=PTS.find(x=>x.cty===r.dataset.c);map.flyTo([p.lat,p.lon],9,{duration:.7});
    setTimeout(()=>p._m&&p._m.openPopup(),750);});
}
function refresh(){draw();list();
  document.getElementById('sub').textContent= mode==='total'?'All three campaigns combined ('+
    Object.values(TOT).reduce((a,b)=>a+b,0).toLocaleString()+' signatures)'
    : mode+'\u2019s signatures by county ('+TOT[mode].toLocaleString()+' total)';}
document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;

const legend=L.control({position:'bottomright'});

   <circle cx="22" cy="42" r="${R(2000)}" fill="#9aa8a6" fill-opacity=".3" stroke="#9aa8a6"/>
   <circle cx="22" cy="50" r="${R(200)}" fill="#9aa8a6" fill-opacity=".3" stroke="#9aa8a6"/>
   <text x="52" y="30" font-size="10" fill="#4a5e66">2000</text><text x="52" y="52" font-size="10" fill="#4a5e66">200</text></svg>`;
  return d;};
legend.addTo(map);
document.getElementById('foot').innerHTML=
  `One circle per county, placed at the county center; area is proportional to signature count. `+
  `Signatures land in 68 of Wisconsin\u2019s 72 counties. Use the tabs to switch between the combined `+
  `total and each campaign.`;
map.fitBounds(L.latLngBounds(PTS.filter(p=>p.total>0).map(p=>[p.lat,p.lon])).pad(0.08));
refresh();
