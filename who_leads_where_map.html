<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signatures: who leads where</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --ink:#16252b; --ink-soft:#4a5e66; --line:#dde4e3;
    --paper:#f5f3ec; --panel:#ffffff;
    --rod:#0e7c7b; --hong:#6d5bd0; --barn:#c4892f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;}
  header{padding:18px 26px 16px; background:var(--panel); border-bottom:1px solid var(--line);
    flex:0 0 auto; display:flex; align-items:baseline; gap:22px; flex-wrap:wrap;}
  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600;}
  h1{font-size:20px; font-weight:700; letter-spacing:-.01em; line-height:1.1;}
  h1 small{display:block; font-size:12.5px; font-weight:400; color:var(--ink-soft);
    letter-spacing:0; margin-top:3px;}
  main{flex:1 1 auto; display:flex; min-height:0;}
  #map{flex:1 1 auto; background:#e9ece8;}
  aside{flex:0 0 300px; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; padding:18px 20px;}
  aside h2{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600; margin:18px 0 11px;}
  aside h2:first-child{margin-top:0;}
  /* segmented toggle */
  .seg{display:flex; gap:4px; background:#eceae1; padding:4px; border-radius:10px; margin-left:auto;}
  .seg button{border:0; background:transparent; font:inherit; font-size:12.5px; font-weight:600;
    color:var(--ink-soft); padding:7px 13px; border-radius:7px; cursor:pointer;
    display:flex; align-items:center; gap:7px; transition:all .12s;}
  .seg button .dot{width:9px;height:9px;border-radius:50%;}
  .seg button.on{background:var(--panel); color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.1);}
  /* leaderboard */
  .led{display:flex; flex-direction:column; gap:9px; margin-bottom:4px;}
  .ledrow{display:flex; align-items:center; gap:9px;}
  .ledrow .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;}
  .ledrow .nm{font-size:13px; font-weight:600; width:78px; flex:0 0 auto;}
  .ledrow .track{flex:1 1 auto; height:8px; background:#eceae1; border-radius:4px; overflow:hidden;}
  .ledrow .fill{height:100%; border-radius:4px;}
  .ledrow .v{font-size:12px; font-variant-numeric:tabular-nums; color:var(--ink-soft);
    width:30px; text-align:right; flex:0 0 auto;}
  /* city table */
  table{width:100%; border-collapse:collapse; font-size:12px;}
  th{font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft);
    font-weight:600; text-align:right; padding:4px 5px; border-bottom:1px solid var(--line);}
  th.l{text-align:left;}
  td{padding:5px; border-bottom:1px solid #f0efe7; font-variant-numeric:tabular-nums; text-align:right;}
  td.l{text-align:left; font-weight:500;}
  td .ld{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  tr.click{cursor:pointer;} tr.click:hover td{background:#f5f4ec;}
  td.win{font-weight:700;}
  .legend{background:rgba(255,255,255,.94); padding:11px 14px; border-radius:10px;
    border:1px solid var(--line); box-shadow:0 2px 10px rgba(0,0,0,.06); font-size:11px;
    color:var(--ink-soft); line-height:1.5;}
  .legend .lt{font-weight:600;color:var(--ink);letter-spacing:.07em;text-transform:uppercase;
    margin-bottom:8px;font-size:10px;}
  .legend .lk{display:flex;align-items:center;gap:7px;margin:3px 0;}
  .legend .lk .dot{width:10px;height:10px;border-radius:50%;}
  .legend svg{display:block;margin-top:8px;}
  .leaflet-popup-content-wrapper{border-radius:9px;}
  .leaflet-popup-content{margin:11px 14px;font-family:inherit;}
  .pc-name{font-size:14px;font-weight:700;}
  .pc-sub{font-size:11px;color:var(--ink-soft);margin:2px 0 7px;}
  .pc-r{display:flex;align-items:center;gap:7px;font-size:12px;margin:3px 0;}
  .pc-r .dot{width:8px;height:8px;border-radius:50%;}
  .pc-r b{margin-left:auto;font-variant-numeric:tabular-nums;}
  .foot{font-size:11px;color:var(--ink-soft);margin-top:16px;padding-top:14px;
    border-top:1px solid var(--line);line-height:1.5;}
  @media(max-width:820px){aside{display:none} header{padding:14px 18px} .seg{order:3;width:100%;margin-left:0}}
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Wisconsin petition drives &middot; comparison</div>
    <h1>Who leads where
      <small>Strongest campaign per city, by share of its own signatures</small></h1>
  </div>
  <div class="seg" id="seg">
    <button data-mode="lead" class="on">Who leads</button>
    <button data-mode="Rodriguez"><span class="dot" style="background:var(--rod)"></span>Rodriguez</button>
    <button data-mode="Hong"><span class="dot" style="background:var(--hong)"></span>Hong</button>
    <button data-mode="Barnes"><span class="dot" style="background:var(--barn)"></span>Barnes</button>
  </div>
</header>
<main>
  <div id="map"></div>
  <aside>
    <h2 id="ldtitle">Cities led</h2>
    <div class="led" id="led"></div>
    <h2>Top cities</h2>
    <div id="tablewrap"></div>
    <div class="foot" id="foot"></div>
  </aside>
</main>

": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Rubicon", "lat": 43.312144, "lon": -88.452793, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Cecil", "lat": 44.811027, "lon": -88.418253, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Springfield", "lat": 42.641667, "lon": -88.411944, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Trempealeau", "lat": 44.021843, "lon": -91.4282, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Potosi", "lat": 42.6884, "lon": -90.700153, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Brule", "lat": 46.576318, "lon": -91.553862, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Shell Lake", "lat": 45.753598, "lon": -91.960606, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Luck", "lat": 45.556799, "lon": -92.416391, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Turtle Lake", "lat": 45.421349, "lon": -92.178142, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Waldo", "lat": 43.657087, "lon": -87.97217, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Stanley", "lat": 44.968872, "lon": -90.938935, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Gordon", "lat": 46.233603, "lon": -91.803301, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "New London", "lat": 44.392847, "lon": -88.755428, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Westby", "lat": 43.663123, "lon": -90.87403, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}, {"city": "Baileys Harbor", "lat": 45.056549, "lon": -87.167626, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665}], "totals": {"Rodriguez": 3194, "Hong": 4374, "Barnes": 2334}};
const cities = DATA.cities, totals = DATA.totals;
const C = {Rodriguez:'#0e7c7b', Hong:'#6d5bd0', Barnes:'#c4892f'};
const NAMES = ['Rodriguez','Hong','Barnes'];

const map = L.map('map',{zoomControl:false,scrollWheelZoom:true}).setView([44.4,-89.7],7);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

const R = c => Math.max(4, Math.sqrt(c)*1.5);
const layer = L.layerGroup().addTo(map);
let mode = 'lead';

function popupHTML(c){
  let rows = NAMES.map(n=>`<div class="pc-r"><span class="dot" style="background:${C[n]}"></span>
     ${n}<b>${c.counts[n].toLocaleString()}</b></div>`).join('');
  const sub = mode==='lead' ? `Leads: <b style="color:${C[c.leader]}">${c.leader}</b>`
    : `${(c.shares[mode]*100).toFixed(2)}% of ${mode}\u2019s signatures`;
  return `<div class="pc-name">${c.city}</div><div class="pc-sub">${sub}</div>${rows}`;
}

function draw(){
  layer.clearLayers();
  cities.forEach(c=>{
    let color, val, show=true;
    if(mode==='lead'){ color=C[c.leader]; val=c.total; }
    else { color=C[mode]; val=c.counts[mode]; show = val>0; }
    if(!show) return;
    const m=L.circleMarker([c.lat,c.lon],{radius:R(val),color:color,weight:1,opacity:.5,
      fillColor:color,fillOpacity:.45}).addTo(layer);
    m.bindPopup(popupHTML(c));
    m.on('mouseover',()=>m.setStyle({fillOpacity:.72,weight:2}));
    m.on('mouseout',()=>m.setStyle({fillOpacity:.45,weight:1}));
    c._m=m;
  });
}

// --- aside: leaderboard ---
function buildLeaderboard(){
  const led=document.getElementById('led');
  if(mode==='lead'){
    document.getElementById('ldtitle').textContent='Cities led (by share)';
    const cnt={Rodriguez:0,Hong:0,Barnes:0};
    cities.forEach(c=>cnt[c.leader]++);
    const max=Math.max(...Object.values(cnt));
    led.innerHTML=NAMES.map(n=>`<div class="ledrow"><span class="dot" style="background:${C[n]}"></span>
      <span class="nm">${n}</span><span class="track"><span class="fill"
      style="width:${cnt[n]/max*100}%;background:${C[n]}"></span></span>
      <span class="v">${cnt[n]}</span></div>`).join('');
  } else {
    document.getElementById('ldtitle').textContent=mode+' \u2014 reach';
    const reached=cities.filter(c=>c.counts[mode]>0).length;
    led.innerHTML=`<div class="ledrow"><span class="dot" style="background:${C[mode]}"></span>
      <span class="nm">${mode}</span><span class="track"><span class="fill"
      style="width:100%;background:${C[mode]}"></span></span></div>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:2px">
      ${totals[mode].toLocaleString()} signatures across ${reached} cities</div>`;
  }
}

// --- aside: top city table ---
function buildTable(){
  const wrap=document.getElementById('tablewrap');
  const sorted=[...cities].sort((a,b)=> mode==='lead'? b.total-a.total : b.counts[mode]-a.counts[mode]);
  const rows=sorted.slice(0,15).map(c=>{
    const cells=NAMES.map(n=>`<td class="${c.leader===n&&mode==='lead'?'win':''}"
      style="${c.leader===n&&mode==='lead'?'color:'+C[n]:''}">${c.counts[n]||''}</td>`).join('');
    return `<tr class="click" data-city="${c.city}">
      <td class="l"><span class="ld" style="background:${C[c.leader]}"></span>${c.city}</td>${cells}</tr>`;
  }).join('');
  wrap.innerHTML=`<table><thead><tr><th class="l">City</th>
    <th>Rod</th><th>Hong</th><th>Barn</th></tr></thead><tbody>${rows}</tbody></table>`;
  wrap.querySelectorAll('tr.click').forEach(tr=>tr.onclick=()=>{
    const c=cities.find(x=>x.city===tr.dataset.city);
    map.flyTo([c.lat,c.lon],11,{duration:.8});
    setTimeout(()=>c._m&&c._m.openPopup(),850);
  });
}

function refresh(){ draw(); buildLeaderboard(); buildTable(); }

// segmented control
document.getElementById('seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  mode=b.dataset.mode;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x===b));
  refresh();
});

// legend
const legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  const d=L.DomUtil.create('div','legend');
  d.innerHTML=`<div class="lt">Leading campaign</div>
    ${NAMES.map(n=>`<div class="lk"><span class="dot" style="background:${C[n]}"></span>${n}</div>`).join('')}
    <svg width="120" height="56"><text x="0" y="11" font-size="10" fill="#4a5e66">circle area = signatures</text>
    <circle cx="20" cy="38" r="${R(500)}" fill="#9aa8a6" fill-opacity=".3" stroke="#9aa8a6"/>
    <circle cx="20" cy="44" r="${R(50)}" fill="#9aa8a6" fill-opacity=".3" stroke="#9aa8a6"/></svg>`;
  return d;
};
legend.addTo(map);

document.getElementById('foot').innerHTML=
  `Each campaign is normalized to its own total (Rodriguez ${totals.Rodriguez.toLocaleString()}, `+
  `Hong ${totals.Hong.toLocaleString()}, Barnes ${totals.Barnes.toLocaleString()}), so a city is `+
  `\u201cled\u201d by whichever campaign drew its <i>largest share</i> there \u2014 not its largest raw count. `+
  `Switch tabs to see each campaign\u2019s own footprint. ${cities.length} cities shown.`;

map.fitBounds(L.latLngBounds(cities.map(c=>[c.lat,c.lon])).pad(0.08));
refresh();
</script>
