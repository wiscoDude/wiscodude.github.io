<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signatures: over / under-index</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{--ink:#16252b;--ink-soft:#4a5e66;--line:#dde4e3;--paper:#f5f3ec;--panel:#fff;
    --over:#b2182b;--under:#2166ac;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--ink);background:var(--paper);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  header{padding:18px 26px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    flex:0 0 auto;display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  h1{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
  h1 small{display:block;font-size:12.5px;font-weight:400;color:var(--ink-soft);margin-top:3px;}
  .seg{display:flex;gap:4px;background:#eceae1;padding:4px;border-radius:10px;margin-left:auto;}
  .seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:600;
    color:var(--ink-soft);padding:7px 15px;border-radius:7px;cursor:pointer;transition:all .12s;}
  .seg button.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  main{flex:1 1 auto;display:flex;min-height:0;}
  #map{flex:1 1 auto;background:#e9ece8;}
  aside{flex:0 0 300px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:18px 20px;}
  aside h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
    font-weight:600;margin:18px 0 10px;display:flex;align-items:center;gap:7px;}
  aside h2:first-child{margin-top:0;}
  aside h2 .sw{width:10px;height:10px;border-radius:2px;}
  .irow{display:flex;align-items:center;gap:9px;padding:6px 7px;border-radius:7px;cursor:pointer;}
  .irow:hover{background:#f5f4ec;}
  .irow .nm{font-size:13px;font-weight:500;flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .irow .sub{font-size:11px;color:var(--ink-soft);}
  .irow .idx{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .legend{background:rgba(255,255,255,.95);padding:12px 14px;border-radius:10px;border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(0,0,0,.06);font-size:11px;color:var(--ink-soft);}
  .legend .lt{font-weight:600;color:var(--ink);letter-spacing:.07em;text-transform:uppercase;
    margin-bottom:9px;font-size:10px;}
  .gradbar{height:10px;width:170px;border-radius:3px;
    background:linear-gradient(90deg,#2166ac,#67a9cf,#f2efe4,#ef8a62,#b2182b);}
  .gradlab{display:flex;justify-content:space-between;width:170px;margin-top:4px;font-variant-numeric:tabular-nums;}
  .leaflet-popup-content-wrapper{border-radius:9px;}
  .leaflet-popup-content{margin:11px 14px;font-family:inherit;}
  .pc-name{font-size:14px;font-weight:700;}
  .pc-idx{font-size:13px;margin:3px 0 7px;font-weight:600;}
  .pc-r{display:flex;align-items:center;gap:7px;font-size:12px;margin:2px 0;}
  .pc-r .dot{width:7px;height:7px;border-radius:50%;}
  .pc-r b{margin-left:auto;font-variant-numeric:tabular-nums;}
  .foot{font-size:11px;color:var(--ink-soft);margin-top:16px;padding-top:14px;
    border-top:1px solid var(--line);line-height:1.5;}
  @media(max-width:820px){aside{display:none}header{padding:14px 18px}.seg{order:3;width:100%;margin-left:0;justify-content:center}}
</style>
</head>
<body>
<header>
  <div>

  </div>
</header>
<main>

    <div id="under"></div>
    <div class="foot" id="foot"></div>
  </aside>
</main>

"Barnes": 2.084915388254813}}, {"city": "New London", "lat": 44.392847, "lon": -88.755428, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665, "index": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 4.2425021422450735}, "log2": {"Rodriguez": null, "Hong": null, "Barnes": 2.084915388254813}}, {"city": "Westby", "lat": 43.663123, "lon": -90.87403, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665, "index": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 4.2425021422450735}, "log2": {"Rodriguez": null, "Hong": null, "Barnes": 2.084915388254813}}, {"city": "Baileys Harbor", "lat": 45.056549, "lon": -87.167626, "counts": {"Rodriguez": 0, "Hong": 0, "Barnes": 1}, "shares": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 0.0004284490145672665}, "leader": "Barnes", "total": 1, "margin": 0.0004284490145672665, "index": {"Rodriguez": 0.0, "Hong": 0.0, "Barnes": 4.2425021422450735}, "log2": {"Rodriguez": null, "Hong": null, "Barnes": 2.084915388254813}}], "totals": {"Rodriguez": 3194, "Hong": 4374, "Barnes": 2334}, "grand": 9902, "threshold": 6};
const cities=DATA.cities, totals=DATA.totals, T=DATA.threshold;
const C={Rodriguez:'#0e7c7b',Hong:'#6d5bd0',Barnes:'#c4892f'};
const NAMES=['Rodriguez','Hong','Barnes'];
let camp='Rodriguez';

const map=L.map('map',{zoomControl:false,scrollWheelZoom:true}).setView([44.4,-89.7],7);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

// diverging color on log2(index), clamped to [-2,2] (x0.25 .. x4)
const stops=[[0,[33,102,172]],[.25,[103,169,207]],[.5,[242,239,228]],[.75,[239,138,98]],[1,[178,24,43]]];
function lerp(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
function ramp(t){ // t in 0..1
  for(let i=0;i<stops.length-1;i++){
    if(t<=stops[i+1][0]){const lo=stops[i],hi=stops[i+1];
      const f=(t-lo[0])/(hi[0]-lo[0]);const c=lerp(lo[1],hi[1],f);
      return `rgb(${c[0]},${c[1]},${c[2]})`;}}
  return 'rgb(178,24,43)';
}
function colorFor(idx){
  const l=idx>0?Math.log2(idx):-2;          // 0 sigs -> floor
  const t=Math.min(1,Math.max(0,(l+2)/4));  // map [-2,2]->[0,1]
  return ramp(t);
}
const R=v=>Math.max(4,Math.sqrt(v)*1.5);
const layer=L.layerGroup().addTo(map);

function popup(c){
  const idx=c.index[camp];
  const verdict = idx>=1 ? `over-indexes &times;${idx.toFixed(2)}` : `under-indexes &times;${idx.toFixed(2)}`;
  const col = colorFor(idx);
  const rows=NAMES.map(n=>`<div class="pc-r"><span class="dot" style="background:${C[n]}"></span>${n}
    <b>${c.counts[n]||0}</b></div>`).join('');
  return `<div class="pc-name">${c.city}</div>
    <div class="pc-idx" style="color:${col}">${camp} ${verdict}</div>${rows}
    <div class="pc-r" style="margin-top:5px;color:var(--ink-soft)">pooled total<b>${c.total}</b></div>`;
}
function draw(){
  layer.clearLayers();
  cities.filter(c=>c.total>=T).forEach(c=>{
    const col=colorFor(c.index[camp]);
    const m=L.circleMarker([c.lat,c.lon],{radius:R(c.total),color:'#5a6a6e',weight:.7,opacity:.5,
      fillColor:col,fillOpacity:.82}).addTo(layer);
    m.bindPopup(popup(c));
    m.on('mouseover',()=>m.setStyle({weight:2,color:'#16252b'}));
    m.on('mouseout',()=>m.setStyle({weight:.7,color:'#5a6a6e'}));
    c._m=m;
  });
}
function list(elId, arr){
  document.getElementById(elId).innerHTML=arr.map(c=>`
    <div class="irow" data-city="${c.city}">
      <span class="nm">${c.city}<div class="sub">${c.counts[camp]||0} of ${c.total} pooled</div></span>
      <span class="idx" style="color:${colorFor(c.index[camp])}">&times;${c.index[camp].toFixed(2)}</span>
    </div>`).join('');
  document.querySelectorAll('#'+elId+' .irow').forEach(r=>r.onclick=()=>{
    const c=cities.find(x=>x.city===r.dataset.city);
    map.flyTo([c.lat,c.lon],11,{duration:.8});setTimeout(()=>c._m&&c._m.openPopup(),850);});
}
function sidebar(){
  const elig=cities.filter(c=>c.total>=T);
  const over=[...elig].sort((a,b)=>b.index[camp]-a.index[camp]).slice(0,8);
  // under: lowest index, tie-break by larger pooled volume (surfaces big cities the campaign misses)
  const under=[...elig].sort((a,b)=> a.index[camp]-b.index[camp] || b.total-a.total).slice(0,8);
  list('over',over); list('under',under);
}
function refresh(){draw();sidebar();}

document.getElementById('seg').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;camp=b.dataset.c;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x===b));refresh();});

const legend=L.control({position:'bottomright'});
legend.onAdd=function(){const d=L.DomUtil.create('div','legend');
  d.innerHTML=`<div class="lt">Index vs. combined field</div><div class="gradbar"></div>
    <div class="gradlab"><span>&times;0.25</span><span>&times;1 par</span><span>&times;4</span></div>
    <div style="margin-top:9px;font-size:10.5px">circle area = pooled signatures</div>`;return d;};
legend.addTo(map);

document.getElementById('foot').innerHTML=
  `Baseline = all three campaigns pooled (${DATA.grand.toLocaleString()} signatures). For the selected `+
  `campaign, a city\u2019s index is its share of <i>that campaign\u2019s</i> signatures divided by the city\u2019s `+
  `share of the pooled total. <b>&times;1</b> means exactly proportional; above, the campaign draws more than `+
  `its fair share there; below, less. Only cities with \u2265${T} pooled signatures are shown (${cities.filter(c=>c.total>=T).length} of ${cities.length}).`;

map.fitBounds(L.latLngBounds(cities.filter(c=>c.total>=T).map(c=>[c.lat,c.lon])).pad(0.08));
refresh();
</script>
