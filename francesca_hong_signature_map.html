<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signatures by City</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<style>
  :root{
    --ink:#16252b; --ink-soft:#4a5e66; --line:#dde4e3;
    --paper:#f5f3ec; --panel:#ffffff;
    --teal:#0e7c7b; --teal-deep:#0a4f50; --gold:#c4892f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    padding:18px 26px 16px; background:var(--panel);
    border-bottom:1px solid var(--line); flex:0 0 auto;
    display:flex; align-items:baseline; gap:22px; flex-wrap:wrap;
  }
  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--teal); font-weight:600;}
  h1{font-size:20px; font-weight:700; letter-spacing:-.01em; line-height:1.1;}
  h1 small{display:block; font-size:12.5px; font-weight:400; color:var(--ink-soft);
    letter-spacing:0; margin-top:3px;}
  .stats{display:flex; gap:26px; margin-left:auto;}
  .stat{text-align:right; line-height:1;}
  .stat .n{font-size:24px; font-weight:700; font-variant-numeric:tabular-nums;
    color:var(--teal-deep);}
  .stat .l{font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-soft); margin-top:5px;}
  main{flex:1 1 auto; display:flex; min-height:0;}
  #map{flex:1 1 auto; background:#e9ece8;}
  aside{
    flex:0 0 290px; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; padding:18px 20px;
  }
  aside h2{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600; margin-bottom:12px;}
  .row{
    display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:7px;
    cursor:pointer; transition:background .12s;
  }
  .row:hover{background:#f0efe7;}
  .rank{font-size:11px; color:var(--ink-soft); width:18px; font-variant-numeric:tabular-nums;
    text-align:right; flex:0 0 auto;}
  .bar-wrap{flex:1 1 auto; min-width:0;}
  .name{font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis;}
  .bar{height:4px; border-radius:2px; background:var(--teal); margin-top:4px;}
  .cnt{font-size:12.5px; font-weight:600; font-variant-numeric:tabular-nums;
    color:var(--teal-deep); flex:0 0 auto; width:38px; text-align:right;}
  /* legend */
  .legend{
    background:rgba(255,255,255,.94); padding:11px 14px; border-radius:10px;
    border:1px solid var(--line); box-shadow:0 2px 10px rgba(0,0,0,.06);
    font-size:11px; color:var(--ink-soft); line-height:1;
  }
  .legend .lt{font-weight:600; color:var(--ink); letter-spacing:.08em;
    text-transform:uppercase; margin-bottom:10px; font-size:10px;}
  .legend svg{display:block;}
  .leaflet-popup-content-wrapper{border-radius:9px;}
  .leaflet-popup-content{margin:11px 14px; font-family:inherit;}
  .pc-name{font-size:14px; font-weight:700; color:var(--ink);}
  .pc-cnt{font-size:12.5px; color:var(--teal-deep); margin-top:2px;}
  .pc-cnt b{font-size:15px;}
  .foot{font-size:11px; color:var(--ink-soft); margin-top:16px; padding-top:14px;
    border-top:1px solid var(--line); line-height:1.5;}
  @media(max-width:760px){
    aside{display:none}
    .stats{gap:18px}
    header{padding:14px 18px}
  }
</style>
</head>

<header>

</header>

</main>

const pts = DATA.points, meta = DATA.meta;
const maxC = pts[0].count;

const map = L.map('map', {scrollWheelZoom:true, zoomControl:true})
  .setView([44.6, -89.7], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

// area-proportional radius (radius ~ sqrt(count))
const R = c => Math.max(4, Math.sqrt(c) * 1.55);
const markers = {};
const layer = L.layerGroup().addTo(map);

pts.forEach(p => {
  const m = L.circleMarker([p.lat, p.lon], {
    radius:R(p.count), color:'#0a4f50', weight:1, opacity:.55,
    fillColor:'#0e7c7b', fillOpacity:.42
  }).addTo(layer);
  m.bindPopup(`<div class="pc-name">${p.city}</div>
    <div class="pc-cnt"><b>${p.count.toLocaleString()}</b> signature${p.count!=1?'s':''}</div>`);
  m.on('mouseover', ()=>m.setStyle({fillOpacity:.68, weight:2}));
  m.on('mouseout',  ()=>m.setStyle({fillOpacity:.42, weight:1}));
  markers[p.city] = {marker:m, p};
});

// fit to all points
const bounds = L.latLngBounds(pts.map(p=>[p.lat,p.lon]));
map.fitBounds(bounds.pad(0.08));

// stats
document.getElementById('s-total').textContent = meta.mapped_sigs.toLocaleString();
document.getElementById('s-cities').textContent = meta.distinct_cities.toLocaleString();
document.getElementById('s-top').textContent = pts[0].city;

// ranked list (top 25)
const list = document.getElementById('list');
pts.slice(0,25).forEach((p,i)=>{
  const row = document.createElement('div'); row.className='row';
  row.innerHTML = `<div class="rank">${i+1}</div>
    <div class="bar-wrap"><div class="name">${p.city}</div>
      <div class="bar" style="width:${Math.max(6,p.count/maxC*100)}%"></div></div>
    <div class="cnt">${p.count}</div>`;
  row.onclick = ()=>{ map.flyTo([p.lat,p.lon], 11, {duration:.8});
    setTimeout(()=>markers[p.city].marker.openPopup(), 850); };
  list.appendChild(row);
});

// footnote
document.getElementById('foot').innerHTML =
  `Showing <b>${meta.mapped_sigs.toLocaleString()}</b> of ${meta.total_with_city.toLocaleString()} `+
  `signatures with a listed city (${meta.mapped_pct}%). The remaining `+
  `${meta.unmapped_sigs} use ambiguous township names that can't be placed reliably. `+
  `Circle area is proportional to signature count.`;

// size legend
const legend = L.control({position:'bottomright'});
legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  const vals = [10,100,500];
  let svg = `<div class="lt">Signatures</div><svg width="120" height="92">`;
  const cx = 28; let baseY = 78;
  vals.slice().reverse().forEach(v=>{
    const r = R(v);
    svg += `<circle cx="${cx}" cy="${baseY-r}" r="${r}" fill="#0e7c7b" fill-opacity=".35" stroke="#0a4f50" stroke-opacity=".6"/>`;
    svg += `<line x1="${cx}" y1="${baseY-2*r}" x2="92" y2="${baseY-2*r}" stroke="#9aa8a6" stroke-width="1" stroke-dasharray="2 2"/>`;
    svg += `<text x="96" y="${baseY-2*r+4}" font-size="11" fill="#4a5e66">${v}</text>`;
  });
  svg += `</svg>`;
  div.innerHTML = svg;
  return div;
};
legend.addTo(map);
